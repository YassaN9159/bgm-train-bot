name: Daily BGM Upload

on:
  schedule:
    - cron: '0 22 * * *'  # 毎日 07:00 JST（UTC 22:00）
  workflow_dispatch:        # 手動実行用

jobs:
  build-and-upload:
    runs-on: ubuntu-latest
    timeout-minutes: 120

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Python セットアップ
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: FFmpeg インストール
        run: sudo apt-get install -y ffmpeg

      - name: 依存ライブラリインストール
        run: pip install -r requirements.txt

      - name: テスト実行
        run: pytest tests/ -v

      - name: 映像クリップDL（Pexels）
        env:
          PEXELS_API_KEY: ${{ secrets.PEXELS_API_KEY }}
        run: python scripts/fetch_video.py

      - name: BGM生成（yt-dlp）
        run: python scripts/fetch_music.py

      - name: 動画合成（FFmpeg）
        run: python scripts/assemble_video.py

      - name: YouTube投稿
        env:
          YOUTUBE_CLIENT_ID: ${{ secrets.YOUTUBE_CLIENT_ID }}
          YOUTUBE_CLIENT_SECRET: ${{ secrets.YOUTUBE_CLIENT_SECRET }}
          YOUTUBE_REFRESH_TOKEN: ${{ secrets.YOUTUBE_REFRESH_TOKEN }}
        run: python scripts/upload_youtube.py
